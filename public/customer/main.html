    <main id='main'>
      <h3>Contact Form</h3>

      <div class="container">
        <form action="#">
          <label for="fullname">Fulde navn *</label>
          <input type="text" id="fullname" name="fullname" placeholder="Dit fulde navn">

          <label for="street">Vejnavn + husnummer *</label>
          <input type="text" id="street" name="street" placeholder="Vejnavn + husnummer">

          <label for="postal_code">Postnummer *</label>
          <input type="text" id="postal_code" name="street" placeholder="Postnummer">

          <label for="city">By *</label>
          <input type="text" id="city" name="city" placeholder="By">

          <label for="phone">Mobilnummer *</label>
          <input type="text" id="phone" name="phone" placeholder="Mobilnummer">

          <label for="email">Email *</label>
          <input type="text" id="email" name="email" placeholder="Email">

          <input id="btnSubmit" type="submit" value="Submit">
        </form>
      </div>
    </main>
