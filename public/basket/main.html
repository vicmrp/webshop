<main id="main">

  <div class="CartContainer">
    <div class="Header">
      <h3 class="Heading">Indkøbskurv</h3>
      <h5 class="Action" id="remove-all-items">Fjern alt</h5>
    </div>

    <div class="Cart-Items" id="novel-item">
      <div class="image-box">
        <img src="../img/novel.png" style="height:120px" />
      </div>
      <div class="about">
        <h1 class="title">Steen's roman</h1>
      </div>
      <div class="counter">
        <div class="btn" id="novel-plus-btn">+</div>
        <div class="count" id="novel-count">0</div>
        <div class="btn" id="novel-minus-btn">-</div>
      </div>
      <div class="prices">
        <div class="amount" id="novel-price">000,00 kr.</div>
        <div class="remove" id="novel-remove-btn"><u>Fjern</u></div>
      </div>
    </div>

    <div class="Cart-Items pad" id="career-item">
      <div class="image-box">
        <img src="../img/career.png" style="height:120px" />
      </div>
      <div class="about">
        <h1 class="title">Steen's karriere</h1>
      </div>
      <div class="counter">
        <div class="btn" id="career-plus-btn">+</div>
        <div class="count" id="career-count">0</div>
        <div class="btn" id="career-minus-btn">-</div>
      </div>
      <div class="prices">
        <div class="amount" id="career-price">000,00 kr.</div>
        <div class="remove" id="career-remove-btn"><u>Fjern</u></div>
      </div>
    </div>
    <hr>
    <div class="checkout" id="checkout">
      <div class="total">
        <div>
          <div class="Subtotal">Total</div>
        </div>
        <div class="total-amount" id="total-price">000,00 kr.</div>
      </div>
      <button class="button">Check ud</button>
    </div>
  </div>
</main>
